name: Build, Test & Analyze

on:
  push:
    branches: [ feature/PoC ]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [ main ]

jobs:
  build:
    name: Build, Test & SonarCloud
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for SonarCloud blame data and PR analysis

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore src/Rebelit.OT.Discover.EdgeApp.sln

      - name: Build
        run: dotnet build src/Rebelit.OT.Discover.EdgeApp.sln --no-restore --configuration Release

      - name: Run tests
        run: |
          dotnet test src/Rebelit.OT.Discover.EdgeApp.sln \
            --no-build \
            --configuration Release \
            --collect:"XPlat Code Coverage" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
